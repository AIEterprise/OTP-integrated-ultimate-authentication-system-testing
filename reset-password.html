<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex | Secure Reset</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { poppins: ['Poppins', 'sans-serif'] },
                    colors: {
                        'brand-light': '#E0E5EC',
                        'brand-dark': '#1A1B26',
                        'accent': '#3B82F6'
                    },
                    boxShadow: {
                        'neu-light': '9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5)',
                        'neu-light-inset': 'inset 6px 6px 10px 0 rgba(163,177,198, 0.7), inset -6px -6px 10px 0 rgba(255,255,255, 0.8)',
                        'neu-dark': '9px 9px 16px rgba(0,0,0,0.4), -9px -9px 16px rgba(38,40,55, 0.5)',
                        'neu-dark-inset': 'inset 6px 6px 10px 0 rgba(0,0,0, 0.6), inset -6px -6px 10px 0 rgba(38,40,55, 0.5)',
                    }
                }
            }
        }
    </script>

    <style>
        body { transition: background-color 0.5s ease; }
        ::-webkit-scrollbar { display: none; }
        .neu-btn-light:active { box-shadow: inset 2px 2px 5px 0 rgba(163,177,198, 0.7), inset -2px -2px 5px 0 rgba(255,255,255, 0.8); }
        .neu-btn-dark:active { box-shadow: inset 2px 2px 5px 0 rgba(0,0,0, 0.6), inset -2px -2px 5px 0 rgba(38,40,55, 0.5); }
    </style>
</head>

<body class="bg-brand-light dark:bg-brand-dark text-slate-800 dark:text-slate-200 font-poppins min-h-screen flex items-center justify-center overflow-x-hidden selection:bg-accent selection:text-white">

    <button id="theme-toggle" class="fixed top-6 right-6 p-3 rounded-full bg-brand-light dark:bg-brand-dark shadow-neu-light dark:shadow-neu-dark transition-all duration-300 neu-btn-light dark:neu-btn-dark z-50 flex items-center justify-center hover:scale-105">
        <i class="ph ph-moon text-2xl dark:hidden text-slate-700"></i>
        <i class="ph ph-sun text-2xl hidden dark:block text-yellow-400"></i>
    </button>

    <main class="w-full max-w-[90%] sm:max-w-md lg:max-w-lg p-2 sm:p-0 z-10 relative">
        <div id="auth-container" class="bg-brand-light dark:bg-brand-dark rounded-3xl p-8 sm:p-10 shadow-neu-light dark:shadow-neu-dark w-full transform origin-center">
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-brand-light dark:bg-brand-dark shadow-neu-light dark:shadow-neu-dark flex items-center justify-center">
                    <i class="ph-fill ph-shield-check text-4xl text-accent"></i>
                </div>
                <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">Reset Password</h1>
                <p class="text-sm font-medium text-slate-500 dark:text-slate-400 mt-2">Secure your account with a new credential.</p>
            </div>

            <div id="verifying-code" class="text-center py-10">
                <i class="ph ph-spinner animate-spin text-4xl text-accent mb-4"></i>
                <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Validating Protocol...</p>
            </div>

            <div id="view-new-password" class="hidden">
                <form id="form-update-password" class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 ml-1">New Password</label>
                        <div class="relative">
                            <i class="ph ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                            <input type="password" id="new-password" required class="w-full bg-brand-light dark:bg-brand-dark shadow-neu-light-inset dark:shadow-neu-dark-inset rounded-xl py-3 pl-12 pr-12 focus:outline-none focus:ring-2 focus:ring-accent/50 text-sm font-medium transition-all" placeholder="••••••••">
                            <i class="ph ph-eye absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg cursor-pointer hover:text-accent toggle-password"></i>
                        </div>
                        <div class="mt-3 px-1">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Strength</span>
                                <span id="strength-text" class="text-[10px] font-bold text-slate-400 uppercase">None</span>
                            </div>
                            <div class="flex gap-1 h-1.5 w-full">
                                <div id="str-1" class="h-full w-1/3 rounded-full bg-slate-300 dark:bg-slate-700 transition-colors duration-300"></div>
                                <div id="str-2" class="h-full w-1/3 rounded-full bg-slate-300 dark:bg-slate-700 transition-colors duration-300"></div>
                                <div id="str-3" class="h-full w-1/3 rounded-full bg-slate-300 dark:bg-slate-700 transition-colors duration-300"></div>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 ml-1">Confirm Password</label>
                        <div class="relative">
                            <i class="ph ph-check-square absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                            <input type="password" id="confirm-password" required class="w-full bg-brand-light dark:bg-brand-dark shadow-neu-light-inset dark:shadow-neu-dark-inset rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-accent/50 text-sm font-medium transition-all" placeholder="••••••••">
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full py-4 rounded-xl bg-brand-light dark:bg-brand-dark shadow-neu-light dark:shadow-neu-dark text-accent font-bold text-sm tracking-wide transition-all hover:text-blue-600 dark:hover:text-blue-400 neu-btn-light dark:neu-btn-dark flex justify-center items-center gap-2">
                        <span>Update Architecture</span>
                        <i class="ph-bold ph-check"></i>
                    </button>
                </form>
            </div>

            <div class="mt-8 text-center text-sm font-medium">
                <a href="index.html" class="text-slate-500 dark:text-slate-400 hover:text-accent transition-colors flex items-center justify-center gap-2">
                    <i class="ph ph-arrow-left"></i>
                    <span>Back to Portal</span>
                </a>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-brand-dark dark:bg-brand-light text-white dark:text-slate-900 px-6 py-3 rounded-full shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 font-medium text-sm flex items-center gap-2 z-50">
        <i class="ph-bold ph-info text-lg text-accent"></i>
        <span id="toast-msg">Protocol Updated</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtvjI-ImiWt-QUE4N-qgG_zkVwMn-7q0U",
            authDomain: "vortex-atri-hub.firebaseapp.com",
            projectId: "vortex-atri-hub",
            storageBucket: "vortex-atri-hub.firebasestorage.app",
            messagingSenderId: "852943761312",
            appId: "1:852943761312:web:50a177a49a50532685fec5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Motion Engine
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // Theme Engine
        const themeToggle = document.getElementById('theme-toggle');
        const authContainer = document.getElementById('auth-container');
        themeToggle.addEventListener('click', () => {
            gsap.to(authContainer, {
                rotation: "+=360", scale: 0.95, duration: 0.3, ease: "power2.in",
                onComplete: () => {
                    document.documentElement.classList.toggle('dark');
                    gsap.to(authContainer, { scale: 1, duration: 0.4, ease: "back.out(1.5)" });
                }
            });
        });

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.querySelector('i').className = isError ? "ph-bold ph-warning-circle text-red-500" : "ph-bold ph-check-circle text-accent";
            gsap.to(toast, { y: 0, opacity: 1, duration: 0.4, ease: "back.out(1.5)" });
            setTimeout(() => gsap.to(toast, { y: 20, opacity: 0, duration: 0.3 }), 4000);
        }

        // Logic: Extract oobCode from URL
        const urlParams = new URLSearchParams(window.location.search);
        const oobCode = urlParams.get('oobCode');

        if (!oobCode) {
            document.getElementById('verifying-code').innerHTML = `<i class="ph ph-x-circle text-red-500 text-4xl mb-4"></i><p class='text-sm font-bold'>Invalid Request Link</p>`;
            showToast("Missing verification parameters.", true);
        } else {
            verifyPasswordResetCode(auth, oobCode).then(() => {
                gsap.to('#verifying-code', { opacity: 0, duration: 0.3, onComplete: () => {
                    document.getElementById('verifying-code').classList.add('hidden');
                    const formView = document.getElementById('view-new-password');
                    formView.classList.remove('hidden');
                    gsap.from(formView, { y: 20, opacity: 0, duration: 0.5 });
                }});
            }).catch(() => {
                document.getElementById('verifying-code').innerHTML = `<i class="ph ph-warning text-red-500 text-4xl mb-4"></i><p class='text-sm font-bold'>Link Expired or Used</p>`;
                showToast("This link is no longer valid.", true);
            });
        }

        // Strength Meter Logic (Consistent with main system)
        const pwdInput = document.getElementById('new-password');
        const strBars = [document.getElementById('str-1'), document.getElementById('str-2'), document.getElementById('str-3')];
        const strText = document.getElementById('strength-text');

        pwdInput.addEventListener('input', (e) => {
            const val = e.target.value;
            let strength = 0;
            if (val.length >= 8) strength++;
            if (val.match(/[A-Z]/) && val.match(/[0-9]/)) strength++;
            if (val.match(/[^A-Za-z0-9]/)) strength++;

            strBars.forEach(bar => bar.className = "h-full w-1/3 rounded-full bg-slate-300 dark:bg-slate-700 transition-colors");
            if(val.length === 0) return strText.innerText = "None";
            
            if (strength <= 1) { 
                strBars[0].classList.add('bg-red-500'); strText.innerText = "Weak"; strText.className = "text-[10px] font-bold text-red-500 uppercase"; 
            } else if (strength === 2) { 
                strBars[0].classList.add('bg-yellow-500'); strBars[1].classList.add('bg-yellow-500'); strText.innerText = "Medium"; strText.className = "text-[10px] font-bold text-yellow-500 uppercase"; 
            } else { 
                strBars.forEach(b => b.classList.add('bg-green-500')); strText.innerText = "Strong"; strText.className = "text-[10px] font-bold text-green-500 uppercase"; 
            }
        });

        // Submit Handler
        document.getElementById('form-update-password').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pwd = pwdInput.value;
            const confirmPwd = document.getElementById('confirm-password').value;

            if (pwd !== confirmPwd) return showToast("Passwords do not match.", true);
            
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = `<i class="ph ph-spinner animate-spin"></i> Finalizing...`;

            try {
                await confirmPasswordReset(auth, oobCode, pwd);
                showToast("Architecture updated. Redirecting to login...");
                setTimeout(() => window.location.href = 'index.html', 2000);
            } catch (err) {
                showToast("Update failed. Link may be stale.", true);
                btn.disabled = false;
                btn.innerHTML = `<span>Update Architecture</span><i class="ph-bold ph-check"></i>`;
            }
        });

        // Toggle Password
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const input = this.previousElementSibling;
                input.type = input.type === 'password' ? 'text' : 'password';
                this.classList.toggle('ph-eye');
                this.classList.toggle('ph-eye-slash');
            });
        });
    </script>
</body>
</html>
