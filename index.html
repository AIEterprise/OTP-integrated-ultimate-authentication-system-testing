            if(s >= 2) bars[1].classList.add('bg-yellow-500'); 
            if(s >= 3) { bars.forEach(b => b.classList.add('bg-green-500')); }
        });

        // --- SIGNUP & 6-DIGIT OTP DISPATCH ---
        document.getElementById('form-signup').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const pass = document.getElementById('signup-password').value;
            const btn = document.getElementById('btn-signup');
            activeOTP = Math.floor(100000 + Math.random() * 900000).toString(); // Generate

            try {
                btn.innerHTML = `<i class="ph ph-spinner animate-spin"></i>`;
                await createUserWithEmailAndPassword(auth, email, pass);
                
                // Trigger Google Script Bridge
                const bridgeURL = "https://script.google.com/macros/s/AKfycbyLFVSUSXTNObw7i4T76JJL_ln2ILOYD11u-E4tnsjzTkTesx6LUU6v4uXSE_LUIZfAEg/exec";
                await fetch(bridgeURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ email: email, otp_code: activeOTP })
                });

                showToast("6-Digit Code sent to inbox.");
                switchView('view-otp');
            } catch(err) { showToast(err.message, true); }
            finally { btn.innerHTML = `<span>Create Account</span><i class="ph-bold ph-rocket-launch"></i>`; }
        });

        // --- OTP VERIFICATION LOGIC ---
        document.getElementById('btn-otp-verify').addEventListener('click', () => {
            const entered = Array.from(document.querySelectorAll('.otp-input')).map(i => i.value).join('');
            if (entered === activeOTP && activeOTP !== "") {
                showToast("Identity Confirmed.");
                switchView('view-login');
            } else {
                showToast("Invalid Code.", true);
            }
        });

        // --- UTILS ---
        function showToast(msg, isErr = false) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.replace('translate-y-20', 'translate-y-0'); t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => { t.classList.replace('translate-y-0', 'translate-y-20'); t.classList.replace('opacity-100', 'opacity-0'); }, 3000);
        }
    </script>
</body>
</html>
